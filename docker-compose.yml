# ============================================================
# docker-compose.yml
# Orchestre tous les services du projet CDCEPS
# Lance MySQL + Node.js + React + PHP en une commande
# ============================================================

version: '3.8'

services:

  # ── Base de données MySQL ──────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: cdceps_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: cdceps
      MYSQL_USER: cdceps_user
      MYSQL_PASSWORD: cdceps2024
    ports:
      # Port local:port conteneur
      - "3307:3306"
    volumes:
      # Persiste les données MySQL entre les redémarrages
      - mysql_data:/var/lib/mysql
      # Exécute le script SQL au premier démarrage
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
    networks:
      - cdceps_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Node.js ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cdceps_backend
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: mysql          # Nom du service MySQL dans Docker
      DB_USER: cdceps_user
      DB_PASSWORD: cdceps2024
      DB_NAME: cdceps
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
    ports:
      - "3001:3001"
    volumes:
      # Monte le dossier uploads pour persister les fichiers
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cdceps_network

  # ── Frontend React ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cdceps_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - cdceps_network

  # ── PHP Admin ─────────────────────────────────────────────
  php_admin:
    build:
      context: ./php-admin
      dockerfile: Dockerfile
    container_name: cdceps_php
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_USER: cdceps_user
      DB_PASSWORD: cdceps2024
      DB_NAME: cdceps
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - cdceps_network

# ── Volumes persistants ───────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ── Réseau interne ────────────────────────────────────────────
networks:
  cdceps_network:
    driver: bridge