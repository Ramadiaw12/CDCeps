# ============================================================
# nginx.conf
# Configuration nginx pour servir React
# Gère le routing côté client (react-router)
# ============================================================

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Toutes les routes renvoient vers index.html
    # pour que react-router fonctionne correctement
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache les assets statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}