# ============================================================
# docker-compose.yml
# Orchestre tous les services du projet CDCEPS
# Lance PostgreSQL + Node.js + React + PHP en une commande
# ============================================================

version: '3.8'

services:

  # ============================================================
  # BASE DE DONNÉES - PostgreSQL + pgvector
  # ============================================================
  database:
    image: ankane/pgvector:latest
    container_name: cdceps_database
    restart: unless-stopped
    environment:
      POSTGRES_USER: cdcuser
      POSTGRES_PASSWORD: cdcEPS26
      POSTGRES_DB: rag_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cdceps_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdcuser -d rag_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # BACKEND - Node.js
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cdceps_backend
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: cdcuser
      DB_PASSWORD: cdcEPS26
      DB_NAME: rag_db
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
    ports:
      - "3001:3001"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend:/app
      - /app/node_modules
    depends_on:
      database:
        condition: service_healthy
    networks:
      - cdceps_network

  # ============================================================
  # FRONTEND - React
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cdceps_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001/api
      VITE_SOCKET_URL: http://localhost:3001
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - cdceps_network

  # ============================================================
  # ADMIN - PHP
  # ============================================================
  admin:
    build:
      context: ./php-admin
      dockerfile: Dockerfile
    container_name: cdceps_admin
    restart: unless-stopped
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_USER: cdcuser
      DB_PASSWORD: cdcEPS26
      DB_NAME: rag_db
      API_URL: http://backend:3001/api
    ports:
      - "8000:8000"
    volumes:
      - ./php-admin:/var/www/html
    depends_on:
      database:
        condition: service_healthy
    networks:
      - cdceps_network

# ============================================================
# VOLUMES PERSISTANTS
# ============================================================
volumes:
  postgres_data:
    driver: local

# ============================================================
# RÉSEAU INTERNE
# ============================================================
networks:
  cdceps_network:
    driver: bridge